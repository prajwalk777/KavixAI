<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kavix AI v1</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --white:  #f7f7f5;
    --off:    #eeede9;
    --rule:   #222;
    --ink:    #111;
    --mid:    #666;
    --dim:    #aaa;
    --red:    #d32f2f;
    --blue:   #1a56e8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; }

  body {
    background: var(--white);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
  }

  /* Big bold rule across the very top */
  body::before {
    content: '';
    display: block;
    height: 6px;
    background: var(--ink);
  }

  /* ─── Layout ─── */
  .page {
    max-width: 680px;
    margin: 0 auto;
    min-height: calc(100vh - 6px);
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
  }

  /* ─── Header ─── */
  .header {
    padding: 28px 28px 20px;
    border-bottom: 3px solid var(--ink);
    animation: bluntIn 0.4s ease both;
  }

  @keyframes bluntIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .header h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    text-transform: uppercase;
  }

  .v-tag {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2px;
    border: 1.5px solid var(--ink);
    padding: 3px 8px;
  }

  .header-sub {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--mid);
    text-transform: uppercase;
  }

  /* ─── Chat ─── */
  #chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  #chat-box::-webkit-scrollbar { width: 4px; }
  #chat-box::-webkit-scrollbar-thumb { background: var(--dim); }

  .msg {
    padding: 18px 28px;
    border-bottom: 1px solid var(--off);
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 0 16px;
    animation: rowIn 0.25s ease both;
  }

  @keyframes rowIn {
    from { opacity: 0; background: #fffde7; }
    to   { opacity: 1; background: transparent; }
  }

  .msg-user { background: var(--white); }
  .msg-ai   { background: var(--off); }

  .msg-who {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding-top: 2px;
    font-weight: 700;
  }

  .msg-user .msg-who { color: var(--blue); }
  .msg-ai   .msg-who { color: var(--red); }

  .msg-text {
    font-size: 13.5px;
    line-height: 1.75;
    font-weight: 400;
    color: var(--ink);
  }

  /* Typing indicator */
  .msg-typing .msg-text {
    display: flex;
    gap: 5px;
    align-items: center;
    height: 24px;
  }

  .td {
    width: 8px; height: 8px;
    border: 2px solid var(--ink);
    animation: tdBlink 0.8s step-start infinite;
  }
  .td:nth-child(2) { animation-delay: 0.27s; }
  .td:nth-child(3) { animation-delay: 0.54s; }

  @keyframes tdBlink {
    0%, 100% { background: transparent; }
    50%       { background: var(--ink); }
  }

  /* ─── Input ─── */
  .input-section {
    border-top: 3px solid var(--ink);
    padding: 0;
  }

  .input-row {
    display: flex;
  }

  #input {
    flex: 1;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 18px 28px;
    background: var(--white);
    border: none;
    outline: none;
    color: var(--ink);
    border-right: 1px solid var(--rule);
  }

  #input::placeholder { color: var(--dim); font-style: italic; }

  .send-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 18px 24px;
    background: var(--ink);
    color: var(--white);
    border: none;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .send-btn:hover { background: var(--blue); }
  .send-btn:active { background: var(--red); }

  .footer-row {
    padding: 10px 28px;
    border-top: 1px solid var(--off);
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* ─── Modal ─── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(247,247,245,0.95);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal {
    background: var(--white);
    border: 3px solid var(--ink);
    padding: 36px;
    width: min(440px, 90vw);
    box-shadow: 8px 8px 0 var(--ink);
    animation: bluntIn 0.3s ease;
  }

  .modal-tag {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 10px;
  }

  .modal h2 {
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
  }

  .modal p {
    font-size: 11.5px;
    line-height: 1.7;
    color: var(--mid);
    margin-bottom: 20px;
    font-style: italic;
  }

  .modal input {
    width: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    background: var(--off);
    border: 1.5px solid var(--ink);
    color: var(--ink);
    outline: none;
    margin-bottom: 14px;
  }

  .modal input:focus { outline: 2px solid var(--blue); outline-offset: 1px; }

  .modal .send-btn {
    width: 100%;
    padding: 14px;
    font-size: 12px;
    letter-spacing: 2px;
  }

  @media (max-width: 480px) {
    .msg { grid-template-columns: 50px 1fr; padding: 14px 16px; }
    #input { padding: 16px; }
    .send-btn { padding: 16px 16px; }
    .header { padding: 20px 16px; }
    .footer-row { padding: 10px 16px; }
  }
</style>
</head>
<body>

<!-- API Modal -->
<div class="overlay" id="api-modal">
  <div class="modal">
    <div class="modal-tag">// init sequence</div>
    <h2>Kavix AI v1</h2>
    <p>Paste your Anthropic API key to start. Stored in memory only — never persisted.</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-...">
    <button class="send-btn" onclick="saveApiKey()">INITIALIZE →</button>
  </div>
</div>

<div class="page">

  <div class="header">
    <div class="header-top">
      <h1>Kavix AI</h1>
      <span class="v-tag">V1.0</span>
    </div>
    <div class="header-sub">Basic Chat Interface &nbsp;·&nbsp; Claude API</div>
  </div>

  <div id="chat-box">
    <div class="msg msg-ai">
      <span class="msg-who">AI</span>
      <span class="msg-text">Hello. I am Kavix v1. Type a message below and press Send.</span>
    </div>
  </div>

  <div class="input-section">
    <div class="input-row">
      <input type="text" id="input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" onclick="sendMessage()">SEND →</button>
    </div>
    <div class="footer-row">
      <span>Kavix AI v1.0</span>
      <span id="turn-count">0 messages</span>
    </div>
  </div>

</div>

<script>
// ════════════════════════════════════
// API
// ════════════════════════════════════
let API_KEY = '';
let history = [];
let msgCount = 0;

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-')) { alert('Enter a valid Anthropic API key (starts with sk-).'); return; }
  API_KEY = val;
  document.getElementById('api-modal').style.display = 'none';
}

async function callClaude(text) {
  if (!API_KEY) { document.getElementById('api-modal').style.display = 'flex'; return null; }

  history.push({ role: 'user', content: text });
  if (history.length > 40) history.shift();

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 1024,
      system: 'You are Kavix, a helpful AI assistant. Be clear and concise.',
      messages: history
    })
  });

  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  const reply = data.content?.[0]?.text || '(no response)';
  history.push({ role: 'assistant', content: reply });
  if (history.length > 40) history.shift();
  return reply;
}

// ════════════════════════════════════
// UI
// ════════════════════════════════════
function addRow(who, text, typing = false) {
  const box = document.getElementById('chat-box');
  const row = document.createElement('div');
  row.className = `msg msg-${who}${typing ? ' msg-typing' : ''}`;
  if (typing) row.id = 'typing-row';

  const label = document.createElement('span');
  label.className = 'msg-who';
  label.textContent = who === 'user' ? 'YOU' : 'AI';

  const body = document.createElement('span');
  body.className = 'msg-text';

  if (typing) {
    body.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>';
  } else {
    body.textContent = text;
    msgCount++;
    const el = document.getElementById('turn-count');
    if (el) el.textContent = `${msgCount} message${msgCount !== 1 ? 's' : ''}`;
  }

  row.appendChild(label);
  row.appendChild(body);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
  return row;
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addRow('user', text);
  addRow('ai', '', true);

  try {
    const reply = await callClaude(text);
    document.getElementById('typing-row')?.remove();
    if (reply) addRow('ai', reply);
  } catch (err) {
    document.getElementById('typing-row')?.remove();
    addRow('ai', `Error: ${err.message}`);
  }
}
</script>
</body>
</html>
